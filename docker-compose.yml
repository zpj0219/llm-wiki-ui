services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hermes-agent-ui-backend
    ports:
      - "8000:8000"
    restart: unless-stopped
    environment:
      KNOWLEDGE_BASE_ROOT: /data/knowledge-base
      DATABASE_PATH: /var/lib/hermes-ui/app.db
      HERMES_GATEWAY_URL: ${HERMES_GATEWAY_URL:-http://host.docker.internal:8642}
      HERMES_API_KEY: ${HERMES_API_KEY:-2222-2222-2222-2222}
      USE_HERMES_CHAT: ${USE_HERMES_CHAT:-auto}
      HERMES_WEBHOOK_URL: ${HERMES_WEBHOOK_URL:-http://host.docker.internal:8644}
      HERMES_WEBHOOK_SECRET: ${HERMES_WEBHOOK_SECRET:-}
      HERMES_WEBHOOK_ROUTE: ${HERMES_WEBHOOK_ROUTE:-crystallize}
      # Odoo JWT SSO（与 Odoo 自定义模块共享密钥）
      ODOO_SSO_JWT_SECRET: ${ODOO_SSO_JWT_SECRET:-}
      USER_MANAGEMENT_MODE: ${USER_MANAGEMENT_MODE:-local}
    volumes:
      # 与 hermes-data 共享知识库卷（原件 / fulltext / wiki）
      - ${HERMES_KB_PATH:-../hermes-data/data/home/Documents/knowledge-base}:/data/knowledge-base:rw
      - backend-data:/var/lib/hermes-ui
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hermes-agent-ui-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend-data:
