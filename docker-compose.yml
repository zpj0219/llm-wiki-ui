services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: llm-wiki-ui:latest
    container_name: llm-wiki-ui
    ports:
      - "${APP_PORT:-3000}:80"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      KNOWLEDGE_BASE_ROOT: /data/knowledge-base
      DATABASE_PATH: /var/lib/llm-wiki-ui/app.db
      # Hermes Gateway（与 hermes-data/.env 中 API_SERVER_KEY 一致）
      HERMES_GATEWAY_URL: http://host.docker.internal:8642
      HERMES_API_KEY: ${HERMES_API_KEY}
      USE_HERMES_CHAT: ${USE_HERMES_CHAT:-auto}
      DEFAULT_CHAT_MODEL: ${DEFAULT_CHAT_MODEL:-hermes-agent}
    volumes:
      - ${HERMES_KB_PATH:-../hermes-data/data/home/Documents/knowledge-base}:/data/knowledge-base:rw
      - ./data:/var/lib/llm-wiki-ui
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s